<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DarkX Ultra | WhatsApp Pairing</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f0f1a 0%, #1b1b2f 50%, #2c0e37 100%);
    padding: 20px;
  }
  .card {
    background: rgba(20, 20, 32, 0.95);
    border-radius: 24px;
    padding: 40px 32px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(158, 92, 255, 0.25);
  }
  .logo { font-size: 48px; }
  h1 {
    color: #b388ff;
    margin: 10px 0 4px;
    font-size: 26px;
    letter-spacing: 1px;
  }
  p.subtitle {
    color: #9a92b3;
    margin-bottom: 24px;
    font-size: 14px;
  }
  input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 14px;
    border: 2px solid #4a3b66;
    background: #1a1a2e;
    color: #eee;
    font-size: 16px;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  input::placeholder { color: #6f6789; }
  input:focus { border-color: #9e5cff; }
  button {
    width: 100%;
    padding: 14px 16px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #7b2ff7, #4a00e0);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s;
  }
  button:hover { transform: translateY(-2px); }
  button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  #status {
    margin-top: 18px;
    font-size: 14px;
    color: #b9aee0;
    min-height: 20px;
  }
  #code-box {
    display: none;
    margin-top: 20px;
    padding: 18px;
    border-radius: 16px;
    background: #1a1a2e;
    border: 2px dashed #9e5cff;
  }
  #code-box .label {
    font-size: 13px;
    color: #9a92b3;
    margin-bottom: 6px;
  }
  #pairing-code {
    font-size: 30px;
    letter-spacing: 4px;
    font-weight: 700;
    color: #b388ff;
  }
  footer {
    margin-top: 24px;
    font-size: 12px;
    color: #6f6789;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">⚡</div>
    <h1>DarkX Ultra</h1>
    <p class="subtitle">Link your WhatsApp number to bring the bot online</p>

    <input type="text" id="phone" placeholder="e.g. 2557XXXXXXXX (with country code)" />
    <button id="pair-btn">🔗 Get Pairing Code</button>

    <div id="status"></div>

    <div id="code-box">
      <div class="label">✨ Your Pairing Code ✨</div>
      <div id="pairing-code">------</div>
      <div class="label" style="margin-top:10px;">Open WhatsApp → Linked Devices → Link with phone number, then enter this code.</div>
    </div>

    <footer>© 2026 DarkX Ultra — Developed by MrX Dev</footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
